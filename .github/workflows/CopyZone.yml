name: Copy Bunny Storage Zone

on:
  workflow_dispatch:
    inputs:
      source_zone_name:
        description: 'Source Bunny Storage Zone Name'
        required: true
        type: string
      source_pull_zone_url:
        description: 'Pull zone base URL for unauthenticated downloads (e.g. https://myzone.b-cdn.net). Leave empty to download via storage API.'
        required: false
        type: string
      destination_zone_name:
        description: 'Destination Bunny Storage Zone Name'
        required: true
        type: string
      source_endpoint:
        description: 'Source Endpoint (e.g., storage.bunnycdn.com)'
        required: false
        default: 'storage.bunnycdn.com'
        type: string
      destination_endpoint:
        description: 'Destination Endpoint (e.g., storage.bunnycdn.com)'
        required: false
        default: 'storage.bunnycdn.com'
        type: string

jobs:
  CopyZone:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Cache Directory
        run: |
          sudo mkdir --parents /mnt/${{ github.event.repository.name }}
          sudo chown --recursive $USER:$USER /mnt/${{ github.event.repository.name }}

      - name: Run Copy Script
        shell: pwsh
        env:
          SOURCE_ACCESS_KEY: ${{ secrets.SOURCE_ACCESS_KEY }}
          DESTINATION_ACCESS_KEY: ${{ secrets.DESTINATION_ACCESS_KEY }}
        run: |
          $params = @{
            SourceZoneName       = "${{ inputs.source_zone_name }}"
            SourceEndpoint       = "${{ inputs.source_endpoint }}"
            DestinationZoneName  = "${{ inputs.destination_zone_name }}"
            DestinationEndpoint  = "${{ inputs.destination_endpoint }}"
            LocalCachePath       = "/mnt/${{ github.event.repository.name }}"
          }
          if ("${{ inputs.source_pull_zone_url }}") {
            $params.SourcePullZoneUrl = "${{ inputs.source_pull_zone_url }}"
          }
          ./CopyZone.ps1 @params
